{% extends "base.html" %}
{% block content %}
<div class="glass-panel container py-4" style="margin-left:20%;">
    <div class="messages">
        <div class="ai">
            <div class="speech-bubble ai">
                <h1>Reset Password</h1>
                <p>Please enter your new password and confirm it.</p>
                <form action="{{ url_for('main.reset_password', token=token) }}" method="post">
                    {{ form.csrf_token }}
                    <input type="password" name="password" class="input-glass" placeholder="New Password">
					<br>
					<br>
                    <input type="password" name="confirm_password" class="input-glass" placeholder="Confirm Password">
					<br>
					<br>
                    <input type="submit" value="Reset Password" class="button-glass">
                    
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
